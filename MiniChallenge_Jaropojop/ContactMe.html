<!DOCTYPE html>
<html>
<head>
    <title>Talk to Double J</title>
</head>
<body>
    <header>
    <h1>Jairo Jaropojop's Contact HIM</h1>
    <link rel="stylesheet" href="ContactMe.css">
    <nav>
        <a href="MiniChallengeBio.html">Who was that Guy again?</a>
      
    </nav>
</header>
    <div id="form">
        <form>
            <fieldset>
                <legend>What do you wanna tell him?</legend>
                
                <label for="email">Email:</label>
                <input type="text" id="email" name="email" placeholder="fullName@mail.com" required>
                <br>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="#########" required>
                <br><br>
                <label for="aoc">Area of Concern:</label>
                <select id="aoc">
                    <option value="Cat_1">Love Your Website</option>
                    <option value="Cat_2">Hate Your Website</option>
                    <option value="Cat_3">Just Wanted to drop you something</option>
                </select>
                <br><br>
                <label for="bday">Birthdate:</label>
                <input type="date" id="date" name="date" required>
                <br><br>
                <label for="favCol">Favorite Color:</label>
                <input type="color" id="favCol" name="favCol" required>
                <br><br>
                <label for="title">Title of Message:</label>
                <input type="text" id="title" name="title" placeholder="Title of comment HERE" required>
                <br><br>
                <label for="message">Your Message:</label>
                <textarea id="message" placeholder="Your message here." rows="5" cols="20" required></textarea>
            </fieldset>
            <br>
            <section id="buttons">
                <input type="reset">
                <button type="submit"> Submit Form</button>
            </section>
         
        </form>
    </div>
</body>
</html>
